<h2 style="background-color: aqua; color: crimson;">SWITCH</h2>
<br>
@switch(day)
{
    @case('1'){
        <p>SUN</p>
    }
    @case('2'){
        <p>MON</p>
    }
    @case('3'){
        <p>TUE</p>
    }
    @case('4'){
        <p>WED</p>
    }
    @case('5'){
        <p>THU</p>
    }
    @case('6'){
        <p>FRI</p>
    }
    @case('7'){
        <p>SAT</p>
    }
    @default{
        <p>INVALID DAY</p>
    }
}
